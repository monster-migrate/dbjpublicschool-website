<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | Divya Jyoti Public School</title>
    <link rel="stylesheet" href="styles/under_construction.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles/btn.css" />
  </head>
  <body>
    <div class="overlay"></div>

    <main class="content">
      <div class="logo">🎓</div>
      <h1 class="brand-name">DIVYA JYOTI PUBLIC SCHOOL</h1>
      <h2 class="status-title">
        Our New Digital Campus is
        <span class="highlight">Under Construction</span>
      </h2>
      <p class="description">
        We are currently upgrading our website to better serve our students and
        parents. Something amazing is coming your way very soon!
      </p>

      <div class="countdown">
        <div class="time-box">
          <span id="days">12</span>
          <p>Days</p>
        </div>
        <div class="time-box">
          <span id="hours">08</span>
          <p>Hours</p>
        </div>
        <div class="time-box">
          <span id="minutes">45</span>
          <p>Mins</p>
        </div>
      </div>

      <form class="notify-form">
        <input type="email" placeholder="Enter your email address" required />
        <button type="submit" class="btn-primary">Notify Me</button>
      </form>

      <div class="contact-info">
        <p>
          Need urgent help?
          <a href="mailto:admissions@dibyajyoti.edu">Contact Admissions</a>
        </p>
      </div>
    </main>
  </body>
</html>
